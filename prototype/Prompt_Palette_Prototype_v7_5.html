<html lang="ja">
<head>
<meta charset="UTF-8" />

<title>Prompt Palette Prototype v7.5</title>
<style>
:root{
  --paper:#fffaf7; --ink:#7e63b2; --ink-soft:#9c7bc8;
  --fill:#d6b8f6; --fill-strong:#c9a4ef; --fill-soft:#efe5fb;
  --line:rgba(210,180,244,.62);
  --header-start:#ead8fb; --header-end:#dcf5fb;
  --thumb-start:#d6b8f6; --thumb-end:#ddf6fb; --thumb-accent:#fde5f2;
  --glass:rgba(255,254,253,.78); --soft:0 10px 24px rgba(102,76,150,.10);
}
*{box-sizing:border-box}
body{margin:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:radial-gradient(circle at 10% 4%, #efe2ff 0, transparent 30%),radial-gradient(circle at 92% 8%, #dcf8fb 0, transparent 28%),linear-gradient(135deg,#fffdfb,#faf3ff 52%,#f4fbfc)}
.app{max-width:430px;margin:0 auto;min-height:100vh}
.app.fixed-preview{padding-bottom:306px}
.view{display:none}.view.active{display:block}
.hero{position:sticky;top:0;z-index:20;padding:12px 12px 10px;background:rgba(255,250,247,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.hero-card{border-radius:24px;padding:14px 15px;color:white;background:linear-gradient(135deg,var(--header-start),var(--header-end));box-shadow:var(--soft)}
.hero-small{display:flex;justify-content:space-between;align-items:center;font-size:11px;text-shadow:0 1px 8px rgba(80,60,118,.2)}
.hero h1{margin:8px 0 2px;font-size:21px;line-height:1.1}.hero p{margin:0;font-size:11px}
.main{padding:12px}.meta{font-size:11px;color:var(--ink-soft);margin:10px 2px;line-height:1.5}
.card{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(16px);border-radius:22px;box-shadow:var(--soft);padding:12px;margin-bottom:10px}
.section-title{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:900;margin-bottom:9px}
.char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.char-card{overflow:hidden;border-radius:20px;background:#fff;border:1px solid var(--line);box-shadow:0 8px 18px rgba(102,76,150,.08);text-align:left;color:var(--ink);padding:0}
.char-thumb{position:relative;height:132px;background:linear-gradient(155deg,var(--thumb-start),var(--thumb-end) 75%,var(--thumb-accent));display:flex;align-items:center;justify-content:center;font-size:38px}
.heart{position:absolute;right:8px;top:8px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;color:var(--ink);box-shadow:0 6px 14px rgba(102,76,150,.12)}
.char-name{padding:8px;font-size:12px;font-weight:900;background:linear-gradient(90deg,var(--fill-soft),#fff)}
.button{border-radius:16px;padding:10px 12px;font-weight:900;border:1px solid var(--line);background:#fff;color:var(--ink)}
.primary{background:linear-gradient(135deg,var(--fill),var(--fill-strong));color:#fff;border-color:transparent}
.full{width:100%}.row{display:flex;gap:8px}.row>*{flex:1}
.hero-img{height:220px;border-radius:28px;background:linear-gradient(155deg,var(--thumb-start),var(--thumb-end) 75%,var(--thumb-accent));display:flex;align-items:center;justify-content:center;font-size:60px;box-shadow:var(--soft);margin-bottom:10px}
.big-name{text-align:center;font-size:23px;font-weight:900;margin:2px 0 4px}.desc{text-align:center;font-size:11px;color:var(--ink-soft);margin:0 15px 12px}
.preset-row{display:flex;gap:7px;overflow:auto}.preset{min-width:96px;border:1px solid var(--line);background:#fff;border-radius:17px;padding:8px;font-size:11px;font-weight:760;color:var(--ink);text-align:left}
.search{width:100%;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.82);color:var(--ink);padding:11px 13px;outline:none;box-shadow:var(--soft)}
.category{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(16px);border-radius:20px;overflow:hidden;margin-bottom:9px;box-shadow:0 8px 18px rgba(102,76,150,.07)}
.cat-head{width:100%;border:0;background:transparent;color:var(--ink);display:flex;justify-content:space-between;align-items:center;padding:11px 12px;font-weight:900;font-size:13px}
.cat-count{color:var(--ink-soft);font-size:11px;font-weight:800;white-space:nowrap}.cat-body{display:none;padding:0 10px 12px}.category.open .cat-body{display:block}
.subcat{margin:8px 0 6px;font-size:11px;font-weight:900;color:var(--ink-soft)}.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--ink-soft);background:#fff;color:var(--ink);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:760;min-height:30px}.tag.on{background:var(--fill);color:#fff;border-color:var(--fill)}.tag .i{font-size:10px;opacity:.82}
.preview-dock{background:rgba(255,250,247,.92);backdrop-filter:blur(20px);border-top:1px solid var(--line)}.preview-dock.fixed{position:fixed;left:0;right:0;bottom:0;z-index:30}.preview-dock.inline{position:static;margin:12px -12px 0;border-bottom:1px solid var(--line)}
.preview-inner{max-width:430px;margin:0 auto;padding:10px 12px calc(12px + env(safe-area-inset-bottom))}
.preview-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.preview-controls{display:flex;gap:7px}
.small-btn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;padding:6px 10px;font-weight:800;font-size:11px}
.preview-card{border:1px solid var(--line);background:#fffefd;border-radius:18px;padding:8px;max-height:108px;overflow:auto}
.preview-line{display:grid;grid-template-columns:62px 1fr;gap:7px;padding:5px 0;border-bottom:1px dashed var(--line)}.preview-line:last-child{border-bottom:0}.preview-empty{color:var(--ink-soft);font-size:12px;padding:8px 2px}
.cat-label{font-size:10px;font-weight:900;color:var(--ink)}.jp{font-size:12px;font-weight:900}.en{font-size:11px;color:var(--ink-soft);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.copy-box{margin-top:8px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px;min-height:38px;max-height:70px;overflow:auto;color:var(--ink-soft);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.modal-bg{position:fixed;inset:0;display:none;align-items:flex-end;z-index:60;background:rgba(83,63,105,.30)}.modal-bg.show{display:flex}.sheet{width:100%;max-width:430px;margin:0 auto;background:rgba(255,250,247,.98);border-radius:28px 28px 0 0;padding:16px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -21px 48px rgba(94,68,124,.2)}.sheet h2{margin:0 0 10px;font-size:18px}.checks{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-height:220px;overflow:auto}.check{background:#fff;border:1px solid var(--line);border-radius:16px;padding:9px;font-size:12px;font-weight:760}.input{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:16px;padding:11px;margin:8px 0 10px}.sample{height:106px;border-radius:20px;background:linear-gradient(135deg,var(--header-start),var(--header-end));display:flex;align-items:center;justify-content:center;font-size:12px;margin:10px 0}.toast{position:fixed;left:50%;bottom:296px;transform:translateX(-50%);background:rgba(126,99,178,.92);color:#fff;border-radius:999px;padding:8px 13px;font-size:12px;font-weight:800;opacity:0;pointer-events:none;transition:.2s ease;z-index:100}.toast.show{opacity:1}
.settings-list{display:flex;flex-direction:column;gap:10px}
.header-option{border:1px solid var(--line);background:#fff;border-radius:18px;padding:11px;text-align:left;color:var(--ink)}
.header-option.active{border-color:var(--fill);background:linear-gradient(135deg,var(--fill-soft),#fff)}
.header-option strong{display:block;font-size:13px;margin-bottom:3px}
.header-option code{display:block;margin-top:7px;font-size:10px;color:var(--ink-soft);white-space:normal;line-height:1.4}


.preview-card{border:1px solid var(--line);background:#fffefd;border-radius:18px;padding:8px;max-height:96px;overflow:auto}
.copy-box{margin-top:8px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px;min-height:44px;max-height:92px;overflow:auto;color:var(--ink-soft);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.preview-actions{display:flex;gap:8px;margin-top:8px;position:sticky;bottom:0;background:rgba(255,250,247,.94);padding-top:8px}
.preview-actions>*{flex:1}
.negative-card{margin-top:8px;border:1px solid var(--line);background:#fffefd;border-radius:18px;overflow:hidden}
.negative-head{width:100%;border:0;background:transparent;color:var(--ink);font-size:12px;font-weight:900;display:flex;justify-content:space-between;align-items:center;padding:10px 12px}
.negative-body{display:none;padding:0 10px 10px}
.negative-card.open .negative-body{display:block}
.negative-box{border:1px solid var(--line);background:#fff;border-radius:14px;padding:8px;max-height:76px;overflow:auto;color:var(--ink-soft);font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}


/* v7.2 compact fixed preview */
.preview-dock.fixed .preview-inner{padding:10px 12px calc(12px + env(safe-area-inset-bottom));}
.preview-dock.fixed .preview-card{max-height:142px;}
.preview-dock.fixed .copy-box{min-height:38px;max-height:42px;white-space:nowrap;overflow-x:auto;overflow-y:hidden;}
.prompt-row{display:grid;grid-template-columns:1fr 94px;gap:8px;align-items:end;margin-top:8px}
.prompt-row .copy-box{margin-top:0}
.prompt-row .button{height:42px;padding:8px 10px}
.save-inline-card{border:1px solid var(--line);background:var(--glass);backdrop-filter:blur(16px);border-radius:20px;box-shadow:0 8px 18px rgba(102,76,150,.07);padding:12px;margin:12px 0 10px}
.save-inline-row{display:grid;grid-template-columns:1fr 86px;gap:8px;align-items:center}
.save-inline-input{width:100%;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:16px;padding:10px 12px;outline:none;font-weight:760}
.save-inline-row .button{height:42px;padding:8px 10px}
.preview-line{display:grid;grid-template-columns:96px 96px 1fr;gap:8px;align-items:baseline;padding:5px 0;border-bottom:1px dashed var(--line)}
.preview-line:last-child{border-bottom:0}
.cat-label{font-size:10px;font-weight:900;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jp{font-size:12px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.en{font-size:11px;color:var(--ink-soft);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.negative-card{margin:10px 0 12px}


/* v7.2.1 micro fix */
.preview-dock.fixed .prompt-row{align-items:stretch;}
.preview-dock.inline .prompt-row{align-items:end;}


/* v7.3 visual polish */
.character-card,
.hero-card,
.profile-hero,
.top-hero,
.character-detail-card{
  position:relative;
  overflow:hidden;
}
.character-card::after,
.hero-card::after,
.profile-hero::after,
.top-hero::after,
.character-detail-card::after{
  content:none !important;
}
.character-card::before,
.hero-card::before,
.profile-hero::before,
.top-hero::before,
.character-detail-card::before{
  content:"";
  position:absolute;
  inset:7px;
  border-radius:inherit;
  background:linear-gradient(135deg, rgba(255,255,255,.34) 0%, rgba(255,255,255,.18) 16%, rgba(255,255,255,.07) 33%, rgba(255,255,255,0) 58%);
  pointer-events:none;
  z-index:1;
}
.character-card > *,
.hero-card > *,
.profile-hero > *,
.top-hero > *,
.character-detail-card > *{
  position:relative;
  z-index:2;
}
.favorite,
.fav,
.heart,
.favorite-btn,
.heart-btn{
  width:34px !important;
  height:34px !important;
  min-width:34px !important;
  min-height:34px !important;
  display:grid !important;
  place-items:center !important;
  border:0 !important;
  background:rgba(255,255,255,.16) !important;
  box-shadow:none !important;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  color:rgba(126,94,145,.72) !important;
  font-size:23px !important;
  line-height:1 !important;
  text-shadow:none !important;
  border-radius:999px !important;
}
.favorite svg,
.fav svg,
.heart svg,
.favorite-btn svg,
.heart-btn svg{
  width:23px !important;
  height:23px !important;
  stroke-width:1.65 !important;
  stroke:currentColor !important;
  fill:none !important;
}
.favorite.active,
.fav.active,
.heart.active,
.favorite-btn.active,
.heart-btn.active,
.character-card.is-favorite .favorite,
.character-card.is-favorite .fav,
.character-card.is-favorite .heart{
  color:rgba(214,132,165,.86) !important;
  background:rgba(255,255,255,.20) !important;
}
.favorite.active svg,
.fav.active svg,
.heart.active svg,
.favorite-btn.active svg,
.heart-btn.active svg,
.character-card.is-favorite .favorite svg,
.character-card.is-favorite .fav svg,
.character-card.is-favorite .heart svg{
  fill:currentColor !important;
  stroke:currentColor !important;
}
.character-card .favorite,
.character-card .fav,
.character-card .heart,
.character-card .favorite-btn,
.character-card .heart-btn{
  position:absolute;
  top:14px;
  right:14px;
}
.preset-load-card{
  margin:14px 0;
  padding:14px;
  border:1px solid var(--line, rgba(201,151,180,.42));
  border-radius:22px;
  background:rgba(255,255,255,.48);
}
.preset-load-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:10px;
  font-weight:800;
}
.preset-load-btn{
  border:1px solid var(--line, rgba(201,151,180,.42));
  border-radius:999px;
  background:rgba(255,255,255,.64);
  padding:8px 14px;
  font-weight:800;
  color:var(--ink, #8c6380);
}
.applied-presets{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.applied-preset-chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid var(--line, rgba(201,151,180,.42));
  border-radius:999px;
  padding:7px 10px;
  background:rgba(255,255,255,.58);
  font-size:13px;
  font-weight:700;
}
.applied-preset-chip .remove{
  opacity:.65;
  font-weight:900;
}


/* =========================================================
   Prototype A Glass Lavender v3 rebuild 3
   - header.hero frame is removed from HTML structure
   - hero-card lives inside main body
   - favorite heart is icon-only, no translucent circle
   ========================================================= */

:root{
  --glass-bg: rgba(255,255,255,.34);
  --glass-border: rgba(255,255,255,.46);
  --glass-shadow: 0 10px 26px rgba(126,94,145,.10);
  --glass-blur: 14px;
  --glass-ink: #4c3c55;
  --glass-muted: #816f8b;
  --glass-accent: #b68cc9;
  --glass-heart: #d98bab;
}

body{
  background:
    radial-gradient(circle at 18% 8%, rgba(255,255,255,.72) 0 9%, transparent 28%),
    radial-gradient(circle at 85% 12%, rgba(216,235,255,.62) 0 10%, transparent 34%),
    radial-gradient(circle at 78% 84%, rgba(255,218,232,.46) 0 12%, transparent 35%),
    linear-gradient(135deg,#efe9f8 0%,#fff8f3 48%,#eaf6fb 100%) !important;
  color:var(--glass-ink);
}

/* Old frame is not used anymore, but keep safety override */
.hero{
  position:static !important;
  top:auto !important;
  z-index:auto !important;
  padding:0 !important;
  background:transparent !important;
  border-bottom:0 !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
}

/* Header card now lives inside body/main */
.main > .hero-card{
  margin:0 0 14px 0 !important;
  padding:18px 20px !important;
  border-radius:24px !important;
  background:rgba(255,255,255,.34) !important;
  border:1px solid rgba(255,255,255,.46) !important;
  box-shadow:0 10px 26px rgba(126,94,145,.10) !important;
  backdrop-filter:blur(14px) saturate(1.12) !important;
  -webkit-backdrop-filter:blur(14px) saturate(1.12) !important;
  position:relative !important;
  overflow:hidden !important;
}
.main > .hero-card::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(135deg, rgba(255,255,255,.34) 0%, rgba(255,255,255,.11) 28%, rgba(255,255,255,0) 58%);
}
.main > .hero-card > *{
  position:relative;
  z-index:1;
}

/* Unified glass surfaces */
.card,
.character-card,
.char-card,
.memo-card,
.favorite-presets,
.preset-load-card,
.category,
.category-card,
.accordion,
.preview-card,
.preview-box,
.preview-dock,
.prompt-box,
.prompt-card,
.save-card,
.negative-card,
.bottom-sheet,
.sheet,
.dialog,
.modal{
  background:rgba(255,255,255,.34) !important;
  border-color:rgba(255,255,255,.46) !important;
  box-shadow:0 10px 26px rgba(126,94,145,.10) !important;
  backdrop-filter:blur(14px) saturate(1.12) !important;
  -webkit-backdrop-filter:blur(14px) saturate(1.12) !important;
}

/* Preserve original rectangular character cards */
.character-card,
.char-card{
  border-radius:24px !important;
  overflow:hidden !important;
}

/* Remove accidental circular/glare pseudo bugs on character cards */
.character-card::before,
.character-card::after,
.char-card::before,
.char-card::after{
  content:none !important;
}

/* Favorite heart: icon only, no translucent circle */
.favorite,
.fav,
.heart,
.favorite-btn,
.heart-btn{
  width:auto !important;
  height:auto !important;
  min-width:0 !important;
  min-height:0 !important;
  border:0 !important;
  background:transparent !important;
  box-shadow:none !important;
  backdrop-filter:none !important;
  -webkit-backdrop-filter:none !important;
  color:rgba(126,94,145,.68) !important;
  font-size:25px !important;
  line-height:1 !important;
  display:block !important;
  padding:0 !important;
  text-shadow:0 1px 6px rgba(255,255,255,.65) !important;
}
.favorite.active,
.fav.active,
.heart.active,
.favorite-btn.active,
.heart-btn.active,
.character-card.is-favorite .favorite,
.character-card.is-favorite .fav,
.character-card.is-favorite .heart{
  color:var(--glass-heart) !important;
}

/* Controls */
button,
.btn,
.primary-btn,
.secondary-btn,
.copy-btn,
.preset-load-btn,
.chip,
.tag-chip,
.pill,
.applied-preset-chip,
input,
textarea,
select{
  backdrop-filter:blur(10px) saturate(1.08) !important;
  -webkit-backdrop-filter:blur(10px) saturate(1.08) !important;
}

button,
.btn,
.secondary-btn,
.preset-load-btn{
  background:rgba(255,255,255,.34) !important;
  border-color:rgba(255,255,255,.48) !important;
}
.primary-btn,
.copy-btn{
  background:rgba(182,140,201,.36) !important;
  border-color:rgba(255,255,255,.48) !important;
  color:var(--glass-ink) !important;
}

.chip,
.tag-chip,
.pill,
.applied-preset-chip{
  background:rgba(255,255,255,.32) !important;
  border-color:rgba(255,255,255,.42) !important;
}
.chip.active,
.tag-chip.active,
.pill.active{
  background:rgba(182,140,201,.30) !important;
  border-color:rgba(182,140,201,.38) !important;
}


/* =========================================================
   Prototype A Glass Lavender v3
   Change only glass transparency / blur / border.
   Goal: test whether white text becomes readable on true glass.
   ========================================================= */

:root{
  --glass-bg: rgba(255,255,255,.14) !important;
  --glass-border: rgba(255,255,255,.28) !important;
  --glass-shadow: 0 12px 34px rgba(126,94,145,.14) !important;
  --glass-blur: 20px !important;
}

/* transparent glass surface */
.main > .hero-card,
.card,
.character-card,
.char-card,
.memo-card,
.favorite-presets,
.preset-load-card,
.category,
.category-card,
.accordion,
.preview-card,
.preview-box,
.preview-dock,
.prompt-box,
.prompt-card,
.save-card,
.negative-card,
.bottom-sheet,
.sheet,
.dialog,
.modal{
  background: rgba(255,255,255,.14) !important;
  border-color: rgba(255,255,255,.28) !important;
  box-shadow: 0 12px 34px rgba(126,94,145,.14) !important;
  backdrop-filter: blur(20px) saturate(1.22) !important;
  -webkit-backdrop-filter: blur(20px) saturate(1.22) !important;
}

/* a little stronger edge shine for clearer glass edge */
.main > .hero-card::before{
  background:
    linear-gradient(135deg,
      rgba(255,255,255,.44) 0%,
      rgba(255,255,255,.16) 24%,
      rgba(255,255,255,0) 58%
    ) !important;
}

/* make white header text readable by adding subtle shadow only */
.main > .hero-card *{
  color: rgba(255,255,255,.96) !important;
  text-shadow:
    0 1px 10px rgba(92,68,110,.32),
    0 0 2px rgba(92,68,110,.20) !important;
}

/* avoid input/copy areas becoming too faint */
input,
textarea,
select{
  background: rgba(255,255,255,.24) !important;
  border-color: rgba(255,255,255,.34) !important;
}

/* buttons: slightly clearer than cards */
button,
.btn,

function loadJSON(key,fallback){try{const v=localStorage.getItem(key);return v===null?fallback:JSON.parse(v)}catch(_){return fallback}}

}
function selectCharacter(id){currentCharacter=effectiveCharacter(characterById(id));saveJSON(STORAGE.selectedCharacterId,id);applyTheme(currentCharacter.themeId);goHome()}
function toggleCharacterFavorite(id,value){CHARACTER_FAVORITES[id]=Boolean(value);saveJSON(STORAGE.characterFavorites,CHARACTER_FAVORITES);if(currentCharacter.id===id)currentCharacter=effectiveCharacter(characterById(id));renderTop()}
function renderHome(){
  currentCharacter=effectiveCharacter(characterById(currentCharacter.id));applyTheme(currentCharacter.themeId);$("bigName").textContent=currentCharacter.displayName;$("charDesc").textContent=currentCharacter.shortDescription;$("memo").textContent=currentCharacter.memo||"";$("heroImg").textContent=charEmoji(currentCharacter);
  const favs=allPresets().filter(p=>!p.hidden&&p.favorite).sort(sortPresets);
  $("presetRow").innerHTML=favs.map(p=>`<button class="preset" onclick="loadPreset('${p.id}')">${escapeHTML(p.displayName)}<br><span class="meta">${p.tagIds.length} tags</span></button>`).join("")||'<span class="meta">Favorite Presetはまだありません。</span>';
}
function renderCharacterForm(){const ch=effectiveCharacter(characterById(currentCharacter.id));$("characterNameInput").value=ch.displayName||"";$("characterDescriptionInput").value=ch.shortDescription||"";$("characterBasePromptInput").value=ch.basePrompt||"";$("characterNegativePromptInput").value=ch.negativePrompt||"";$("characterMemoInput").value=ch.memo||"";$("characterFavoriteInput").checked=Boolean(ch.favorite)}
function saveCharacterForm(){const id=currentCharacter.id;CHARACTER_OVERRIDES[id]={...(CHARACTER_OVERRIDES[id]||{}),displayName:$("characterNameInput").value.trim()||characterById(id).displayName,shortDescription:$("characterDescriptionInput").value.trim(),basePrompt:$("characterBasePromptInput").value.trim(),negativePrompt:$("characterNegativePromptInput").value.trim(),memo:$("characterMemoInput").value.trim()};CHARACTER_FAVORITES[id]=$("characterFavoriteInput").checked;saveJSON(STORAGE.characterOverrides,CHARACTER_OVERRIDES);saveJSON(STORAGE.characterFavorites,CHARACTER_FAVORITES);currentCharacter=effectiveCharacter(characterById(id));showToast("キャラクター設定を保存しました");goHome()}
function loadPreset(id){const p=getPreset(id);if(!p)return;state.clear();p.tagIds.forEach(tagId=>state.add(tagId));goEdit()}

function sortPresets(a,b){
  const rank=p=>p.favorite?(p.mine?0:1):(p.mine?2:3);
  return rank(a)-rank(b)||a.displayName.localeCompare(b.displayName,"ja");
}
function presetTagText(p){
  const samplePreview=String(p.description||"").trim();
  if(samplePreview)return samplePreview;
  return (p.tagIds||[]).map(id=>TAGS.find(t=>t.id===id)?.tag).filter(Boolean).join(", ");
}
function renderPresetLibrary(){
  const input=$("presetSearch");const rawQ=input?.value||"";const q=normalize(rawQ);
  const all=allPresets().filter(p=>!p.hidden);const filtered=all.filter(p=>normalize(p.displayName).includes(q)).sort(sortPresets);
  $("presetCount").textContent=`${filtered.length} presets`;$("presetSearchClear").style.display=q?"grid":"none";
  $("presetLibraryList").innerHTML=filtered.map(p=>`<article class="card library-card"><button class="library-heart ${p.favorite?"active":""}" aria-label="Favorite切り替え" onclick="togglePresetFavorite('${p.id}')">${p.favorite?"♥":"♡"}</button><h2 class="library-card-title">${escapeHTML(p.displayName)}</h2><p class="library-card-preview">${escapeHTML(presetTagText(p))}</p>${p.mine?`<div class="library-card-footer"><span class="my-label">My</span><button class="more-btn" aria-label="メニュー" onclick="openPresetMenu(event,'${p.id}')">…</button></div>`:""}</article>`).join("");
  const empty=!filtered.length;$("presetEmpty").style.display=empty?"block":"none";$("presetEmptyText").innerHTML=q?`「${escapeHTML(rawQ.trim())}」に一致する<br>プリセットはありません。`:"まだプリセットはありません。<br>プロンプト編集でお気に入りの組み合わせを<br>保存すると、ここに並びます。";
}
function togglePresetFavorite(id){const p=getPreset(id);if(!p)return;PRESET_FAVORITES[id]=!p.favorite;saveJSON(STORAGE.presetFavorites,PRESET_FAVORITES);renderPresetLibrary();if($("homeView").classList.contains("active"))renderHome()}
function openPresetMenu(ev,id){ev.stopPropagation();menuPresetId=id;const r=ev.currentTarget.getBoundingClientRect(),m=$("presetMenu");m.style.display="block";m.style.left=Math.max(12,Math.min(innerWidth-154,r.right-142))+"px";m.style.top=Math.min(innerHeight-110,r.bottom+3)+"px"}
function closePresetMenu(){$("presetMenu").style.display="none";menuPresetId=null}
function editPreset(id){const p=getPreset(id);if(!p?.mine)return;builderMode="preset";editingPresetId=id;state.clear();p.tagIds.forEach(t=>state.add(t));document.body.classList.add("preset-edit-mode");$("builderPageTitle").textContent="プリセット編集";$("builderBackBtn").textContent="← 一覧";$("builderPresetName").textContent=p.displayName;renderEdit();show("editView");closePresetMenu()}
function openDeletePreset(id){const p=getPreset(id);if(!p?.mine)return;deleteTargetId=id;$("deletePresetName").textContent=p.displayName;$("deleteDialog").classList.add("show");closePresetMenu()}
function refreshOverwriteSelect(){const mine=allPresets().filter(p=>p.mine&&!p.hidden).sort(sortPresets);$("overwriteSelect").innerHTML=mine.length?mine.map(p=>`<option value="${p.id}">${escapeHTML(p.displayName)}</option>`).join(""):'<option value="">My Presetがありません</option>';if(editingPresetId&&mine.some(p=>p.id===editingPresetId))$("overwriteSelect").value=editingPresetId;$("overwriteConfirm").disabled=!mine.length}

function listText(v){return Array.isArray(v)?v.join(", "):String(v||"")}
function matchesSearch(tag,q){if(!q)return true;const hay=[tag.displayNameJa,tag.tag,tag.description,tag.categoryName,tag.subcategoryName,listText(tag.searchKeywordsJa),listText(tag.aliases),listText(tag.relatedTags)].map(normalize).join(" ");return hay.includes(normalize(q))}
function selectedCountForCategory(cid){return TAGS.filter(t=>t.categoryId===cid&&state.has(t.id)).length}
function groupedTags(q=""){const groups=new Map();[...CATEGORIES].sort((a,b)=>(a.uiOrder||a.sortOrder)-(b.uiOrder||b.sortOrder)).forEach(cat=>{if(!cat.hidden)groups.set(cat.categoryId,{category:cat,subgroups:new Map(),count:0})});TAGS.forEach(tag=>{if(tag.hidden||!matchesSearch(tag,q))return;const cg=groups.get(tag.categoryId);if(!cg)return;if(!cg.subgroups.has(tag.subcategoryId))cg.subgroups.set(tag.subcategoryId,{subcategoryName:tag.subcategoryName,tags:[]});cg.subgroups.get(tag.subcategoryId).tags.push(tag);cg.count++});return [...groups.values()].filter(g=>g.count>0)}
function renderEdit(q=""){applyTheme(currentCharacter.themeId);$("meta").textContent=`${TAGS.length} tags / ${CATEGORIES.length} categories`;$("categoryRoot").innerHTML="";groupedTags(q).forEach(group=>{const cid=group.category.categoryId;const sec=document.createElement("section");sec.className="category"+(openCategories.has(cid)||q?" open":"");const head=document.createElement("button");head.className="cat-head";head.innerHTML=`<span>${group.category.categoryName}</span><span class="cat-count">${selectedCountForCategory(cid)} selected ${sec.classList.contains("open")?"▲":"▼"}</span>`;head.onclick=()=>{openCategories.has(cid)?openCategories.delete(cid):openCategories.add(cid);renderEdit($("search").value.trim())};sec.appendChild(head);const body=document.createElement("div");body.className="cat-body";[...group.subgroups.values()].forEach(sub=>{body.insertAdjacentHTML("beforeend",`<div class="subcat">${sub.subcategoryName}</div>`);const box=document.createElement("div");box.className="tags";sub.tags.forEach(tag=>{const btn=document.createElement("button");btn.className="tag"+(state.has(tag.id)?" on":"");btn.innerHTML=`${escapeHTML(tag.displayNameJa)} <span class="i">ⓘ</span>`;btn.onclick=ev=>{const rect=btn.getBoundingClientRect();ev.clientX>rect.right-30?openInfo(tag):toggleTag(tag)};box.appendChild(btn)});body.appendChild(box)});sec.appendChild(body);$("categoryRoot").appendChild(sec)});refreshPreview()}
function toggleTag(tag){if(state.has(tag.id))state.delete(tag.id);else{if(tag.selectionRule==="single"||tag.selectionRule==="exclusive")TAGS.forEach(o=>{if(o.selectionGroup===tag.selectionGroup)state.delete(o.id)});state.add(tag.id)}renderEdit($("search").value.trim())}
function promptSort(a,b){return ((a.promptOrder??999)-(b.promptOrder??999))||((a.sortOrder??0)-(b.sortOrder??0))}
function buildPrompt(){const selected=TAGS.filter(t=>state.has(t.id)).sort(promptSort);const parts=builderMode==="preset"?selected.map(t=>t.tag):[FIXED_PROMPT_HEADER,currentCharacter.basePrompt,...selected.map(t=>t.tag)];const seen=new Set();return parts.filter(Boolean).flatMap(x=>String(x).split(",")).map(x=>x.trim()).filter(Boolean).filter(x=>{const k=x.toLowerCase();if(seen.has(k))return false;seen.add(k);return true}).join(", ")}
function refreshPreview(){const selected=TAGS.filter(t=>state.has(t.id)).sort(promptSort);$("preview").innerHTML=selected.length?selected.map(tag=>`<div class="preview-line"><div class="cat-label">${tag.categoryName}</div><div class="jp">${escapeHTML(tag.displayNameJa)}</div><div class="en">${escapeHTML(tag.tag)}</div></div>`).join(""):'<div class="preview-empty">タグを選ぶとここに日本語＋英語で表示されます。</div>';$("copyText").textContent=buildPrompt();$("negativeText").textContent=currentCharacter.negativePrompt||"Negative未設定"}
function setPreviewMode(fixed){fixedPreview=Boolean(fixed);saveJSON(STORAGE.fixedPreview,fixedPreview);const dock=$("previewDock");dock.classList.toggle("fixed",fixedPreview);dock.classList.toggle("inline",!fixedPreview);$("app").classList.toggle("fixed-preview",fixedPreview&&builderMode==="prompt");$("toggleFixedBtn").textContent=fixedPreview?"下部固定 ON":"下部固定 OFF";fixedPreview?document.body.appendChild(dock):$("inlinePreviewAnchor").appendChild(dock)}
function openInfo(tag){$("infoBody").innerHTML=`<p style="margin:0 0 4px;font-weight:900;">${escapeHTML(tag.displayNameJa)}</p><p class="en">${escapeHTML(tag.tag)}</p><p style="font-size:12px">${escapeHTML(tag.description||"説明は未登録です。")}</p><div class="sample">${tag.infoThumbnail?"登録サムネ":"登録サムネ未設定"}</div><p class="meta">selection: ${tag.selectionRule} / group: ${tag.selectionGroup}</p>`;$("infoModal").classList.add("show")}
function selectedCategoryIdsFromState(){return new Set(TAGS.filter(t=>state.has(t.id)).map(t=>t.categoryId))}
function renderSaveCategoryChecks(containerId,selectedCategoryIds){const root=$(containerId);root.innerHTML="";[...CATEGORIES].filter(c=>!c.hidden).sort((a,b)=>(a.uiOrder||a.sortOrder)-(b.uiOrder||b.sortOrder)).forEach(cat=>{if(!TAGS.some(t=>t.categoryId===cat.categoryId&&state.has(t.id)))return;const label=document.createElement("label");label.className="check";label.innerHTML=`<input type="checkbox" value="${cat.categoryId}" ${selectedCategoryIds.has(cat.categoryId)?"checked":""}> <span>${cat.categoryName}</span>`;root.appendChild(label)})}
function checkedCategoryIds(containerId){return new Set([...$(containerId).querySelectorAll('input[type="checkbox"]:checked')].map(i=>i.value))}
function selectedTagIdsForCategories(categoryIds){return [...state].filter(id=>{const tag=TAGS.find(t=>t.id===id);return tag&&categoryIds.has(tag.categoryId)}).sort((a,b)=>promptSort(TAGS.find(t=>t.id===a),TAGS.find(t=>t.id===b)))}
function openSave(){$("newPresetName").value="";renderSaveCategoryChecks("newSaveChecks",selectedCategoryIdsFromState());$("saveModal").classList.add("show");setTimeout(()=>$("newPresetName").focus(),50)}
function showToast(text){const t=$("toast");t.textContent=text;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1400)}
function escapeHTML(value){return String(value??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]))}

$("search").addEventListener("input",()=>renderEdit($("search").value.trim()));
$("presetSearch").addEventListener("input",renderPresetLibrary);
$("presetSearchClear").onclick=()=>{$("presetSearch").value="";renderPresetLibrary();$("presetSearch").focus()};
$("clearBtn").onclick=()=>{state.clear();renderEdit($("search").value.trim())};
$("toggleFixedBtn").onclick=()=>setPreviewMode(!fixedPreview);
$("saveBtn").onclick=openSave;
$("overwriteBtn").onclick=()=>{refreshOverwriteSelect();renderSaveCategoryChecks("overwriteSaveChecks",selectedCategoryIdsFromState());$("overwriteDialog").classList.add("show")};
$("copyBtn").onclick=async()=>{try{await navigator.clipboard.writeText($("copyText").textContent);showToast("Promptをコピーしました")}catch(_){showToast("コピー欄を長押ししてコピー")}};
$("closeInfo").onclick=()=>$("infoModal").classList.remove("show");
$("cancelSave").onclick=()=>$("saveModal").classList.remove("show");
$("confirmSave").onclick=()=>{const name=$("newPresetName").value.trim();if(!name)return showToast("プリセット名を入力してください");const categories=checkedCategoryIds("newSaveChecks");if(!categories.size)return showToast("保存するカテゴリを選んでください");const tagIds=selectedTagIdsForCategories(categories);if(!tagIds.length)return showToast("保存するタグがありません");const p={id:"my_"+Date.now(),displayName:name,description:"",tagIds,favorite:false,hidden:false,sortOrder:Date.now(),mine:true};MY_PRESETS.push(p);saveJSON(STORAGE.myPresets,MY_PRESETS);$("saveModal").classList.remove("show");showToast("My Presetに保存しました")};
$("presetMenuEdit").onclick=()=>{if(menuPresetId)editPreset(menuPresetId)};
$("presetMenuDelete").onclick=()=>{if(menuPresetId)openDeletePreset(menuPresetId)};
document.addEventListener("click",e=>{if(!$("presetMenu").contains(e.target))closePresetMenu()});
$("deleteCancel").onclick=()=>$("deleteDialog").classList.remove("show");
$("deleteConfirm").onclick=()=>{if(deleteTargetId){MY_PRESETS=MY_PRESETS.filter(p=>p.id!==deleteTargetId);delete PRESET_FAVORITES[deleteTargetId];saveJSON(STORAGE.myPresets,MY_PRESETS);saveJSON(STORAGE.presetFavorites,PRESET_FAVORITES)}$("deleteDialog").classList.remove("show");deleteTargetId=null;renderPresetLibrary();showToast("プリセットを削除しました")};
$("overwriteCancel").onclick=()=>$("overwriteDialog").classList.remove("show");
$("overwriteConfirm").onclick=()=>{const id=$("overwriteSelect").value,p=getPreset(id);if(!p?.mine)return showToast("上書き対象を選んでください");const categories=checkedCategoryIds("overwriteSaveChecks");if(!categories.size)return showToast("保存するカテゴリを選んでください");const tagIds=selectedTagIdsForCategories(categories);if(!tagIds.length)return showToast("保存するタグがありません");updateMyPreset(id,{tagIds,description:""});editingPresetId=id;$("builderPresetName").textContent=p.displayName;$("overwriteDialog").classList.remove("show");showToast("上書きしました")};
$("negativeToggle").onclick=()=>{const card=$("negativeCard");card.classList.toggle("open");$("negativeArrow").textContent=card.classList.contains("open")?"▲":"▼"};
$("negativeCopyBtn").onclick=async()=>{const text=currentCharacter.negativePrompt||"";if(!text)return showToast("Negative未設定です");try{await navigator.clipboard.writeText(text);showToast("Negative Promptをコピーしました")}catch(_){showToast("Negative欄を長押ししてコピー")}};
$("saveCharacterBtn").onclick=saveCharacterForm;
[$("infoModal"),$("saveModal"),$("overwriteDialog")].forEach(m=>m.addEventListener("click",e=>{if(e.target===m)m.classList.remove("show")}));
$("deleteDialog").addEventListener("click",e=>{if(e.target===$("deleteDialog"))$("deleteDialog").classList.remove("show")});

const savedCharacterId=loadJSON(STORAGE.selectedCharacterId,CHARACTERS[0].id);
currentCharacter=effectiveCharacter(characterById(savedCharacterId));
renderTop();applyTheme(currentCharacter.themeId);setPreviewMode(fixedPreview);show("topView");
</script>
</body></html>
