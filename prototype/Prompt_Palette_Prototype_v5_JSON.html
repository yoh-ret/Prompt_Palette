<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prompt Palette Prototype v5 JSON-driven</title>
<style>
:root{
  --paper:#fffaf7;
  --screen:#fffdfb;
  --ink:#7e63b2;
  --ink-soft:#9c7bc8;
  --lav:#d6b8f6;
  --lav-strong:#c9a4ef;
  --lav-soft:#efe5fb;
  --blue:#ddf6fb;
  --pink:#fde5f2;
  --line:rgba(210,180,244,.62);
  --glass:rgba(255,254,253,.78);
  --shadow:0 18px 44px rgba(102,76,150,.15);
  --soft:0 10px 24px rgba(102,76,150,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:
    radial-gradient(circle at 10% 4%, #efe2ff 0, transparent 30%),
    radial-gradient(circle at 92% 8%, #dcf8fb 0, transparent 28%),
    radial-gradient(circle at 55% 105%, #ffe8f5 0, transparent 24%),
    linear-gradient(135deg,#fffdfb,#faf3ff 52%,#f4fbfc);
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding-bottom:292px;
}
.hero{
  position:sticky;
  top:0;
  z-index:20;
  margin:0;
  padding:12px 12px 10px;
  background:rgba(255,250,247,.72);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
}
.hero-card{
  border-radius:24px;
  padding:14px 15px;
  color:white;
  background:linear-gradient(135deg,#ead8fb,#dcf5fb 78%);
  box-shadow:var(--soft);
}
.hero-small{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:11px;
  text-shadow:0 1px 8px rgba(80,60,118,.2);
}
.hero h1{
  margin:8px 0 2px;
  font-size:21px;
  line-height:1.1;
  text-shadow:0 1px 10px rgba(80,60,118,.22);
}
.hero p{
  margin:0;
  font-size:11px;
  text-shadow:0 1px 8px rgba(80,60,118,.16);
}
.main{padding:12px}
.tools{
  display:flex;
  gap:8px;
  margin-bottom:10px;
}
.search{
  width:100%;
  border:1px solid var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.82);
  color:var(--ink);
  padding:11px 13px;
  outline:none;
  box-shadow:var(--soft);
}
.meta{
  font-size:11px;
  color:#a188c8;
  margin:0 2px 10px;
}
.category{
  border:1px solid var(--line);
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-radius:20px;
  overflow:hidden;
  margin-bottom:9px;
  box-shadow:0 8px 18px rgba(102,76,150,.07);
}
.category[hidden]{display:none}
.cat-head{
  width:100%;
  border:0;
  background:transparent;
  color:var(--ink);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:11px 12px;
  font-weight:900;
  font-size:13px;
}
.cat-count{
  color:#a58ac8;
  font-size:11px;
  font-weight:800;
  white-space:nowrap;
}
.cat-body{
  display:none;
  padding:0 10px 12px;
}
.category.open .cat-body{display:block}
.subcat{
  margin:8px 0 6px;
  font-size:11px;
  font-weight:900;
  color:#9c7bc8;
}
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}
.tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid #a98ad0;
  background:#fff;
  color:#7e63b2;
  border-radius:999px;
  padding:6px 10px;
  font-size:12px;
  font-weight:760;
  min-height:30px;
}
.tag.on{
  background:var(--lav);
  color:#fff;
  border-color:var(--lav);
}
.tag .i{
  font-size:10px;
  opacity:.82;
}
.preview-dock{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:30;
  background:rgba(255,250,247,.92);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
}
.preview-inner{
  max-width:430px;
  margin:0 auto;
  padding:10px 12px calc(12px + env(safe-area-inset-bottom));
}
.preview-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}
.preview-head strong{font-size:14px}
.clear-btn{
  border:1px solid var(--line);
  background:#fff;
  color:#7e63b2;
  border-radius:999px;
  padding:6px 10px;
  font-weight:800;
  font-size:11px;
}
.preview-card{
  border:1px solid var(--line);
  background:#fffefd;
  border-radius:18px;
  padding:8px;
  max-height:108px;
  overflow:auto;
}
.preview-empty{
  color:#a58ac8;
  font-size:12px;
  padding:8px 2px;
}
.preview-line{
  display:grid;
  grid-template-columns:62px 1fr;
  gap:7px;
  padding:5px 0;
  border-bottom:1px dashed #eadcf4;
}
.preview-line:last-child{border-bottom:0}
.cat-label{font-size:10px;font-weight:900;color:#8f70bf}
.jp{font-size:12px;font-weight:900}
.en{font-size:11px;color:#a58ac8;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.copy-box{
  margin-top:8px;
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:8px;
  min-height:38px;
  max-height:52px;
  overflow:auto;
  color:#9b82c1;
  font-size:11px;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
}
.actions{
  display:flex;
  gap:8px;
  margin-top:8px;
}
.actions button{
  flex:1;
  border-radius:15px;
  padding:10px 8px;
  font-size:12px;
  font-weight:900;
  border:1px solid #a98ad0;
}
.primary{
  background:linear-gradient(135deg,var(--lav),var(--lav-strong));
  color:#fff;
  border-color:transparent!important;
}
.secondary{
  background:#fff;
  color:#7e63b2;
}
.modal-bg{
  position:fixed;
  inset:0;
  display:none;
  align-items:flex-end;
  z-index:60;
  background:rgba(83,63,105,.30);
}
.modal-bg.show{display:flex}
.sheet{
  width:100%;
  max-width:430px;
  margin:0 auto;
  background:rgba(255,250,247,.98);
  border-radius:28px 28px 0 0;
  padding:16px 14px calc(18px + env(safe-area-inset-bottom));
  box-shadow:0 -21px 48px rgba(94,68,124,.2);
  color:var(--ink);
}
.sheet h2{
  margin:0 0 10px;
  font-size:18px;
}
.input{
  width:100%;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  border-radius:16px;
  padding:11px;
  margin:8px 0 10px;
}
.checks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  max-height:220px;
  overflow:auto;
}
.check{
  background:#fff;
  border:1px solid var(--line);
  border-radius:16px;
  padding:9px;
  font-size:12px;
  font-weight:760;
}
.sample{
  height:106px;
  border-radius:20px;
  background:linear-gradient(135deg,#ead8fb,#dcf5fb);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  margin:10px 0;
}
.toast{
  position:fixed;
  left:50%;
  bottom:296px;
  transform:translateX(-50%);
  background:rgba(126,99,178,.92);
  color:#fff;
  border-radius:999px;
  padding:8px 13px;
  font-size:12px;
  font-weight:800;
  opacity:0;
  pointer-events:none;
  transition:.2s ease;
  z-index:100;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="hero-card">
      <div class="hero-small"><span>← 優杏</span><span>JSON driven</span></div>
      <h1>メロい微笑み</h1>
      <p>Master v3 から生成したJSONでタグを表示</p>
    </div>
  </header>

  <main class="main">
    <div class="tools">
      <input id="search" class="search" placeholder="タグ検索：笑顔 / smile / 光…" />
    </div>
    <p class="meta" id="meta"></p>
    <div id="categoryRoot"></div>
  </main>
</div>

<div class="preview-dock">
  <div class="preview-inner">
    <div class="preview-head">
      <strong>👀 プレビュー</strong>
      <button class="clear-btn" id="clearBtn">選択解除</button>
    </div>
    <div class="preview-card" id="preview"></div>
    <div class="copy-box" id="copyText"></div>
    <div class="actions">
      <button class="secondary" id="saveBtn">💾 プリセット保存</button>
      <button class="primary" id="copyBtn">📋 コピー</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="infoModal">
  <div class="sheet">
    <h2>ⓘ タグ詳細</h2>
    <div id="infoBody"></div>
    <button class="primary" style="width:100%;margin-top:10px" id="closeInfo">閉じる</button>
  </div>
</div>

<div class="modal-bg" id="saveModal">
  <div class="sheet">
    <h2>💾 プリセット保存</h2>
    <label>プリセット名</label>
    <input class="input" value="メロい微笑み" />
    <div class="checks" id="saveChecks"></div>
    <p class="meta">チェックしたカテゴリ内のONタグだけを、全キャラ共通プリセットとして保存します。</p>
    <div class="actions">
      <button class="secondary" id="cancelSave">キャンセル</button>
      <button class="primary" id="confirmSave">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">コピーしました</div>

const state = new Set();

const categoryRoot = document.getElementById("categoryRoot");
const preview = document.getElementById("preview");
const copyText = document.getElementById("copyText");
const meta = document.getElementById("meta");
const searchInput = document.getElementById("search");

function normalize(value) {
  return String(value || "").toLowerCase();
}

function listText(list) {
  return Array.isArray(list) ? list.join(", ") : "";
}

function matchesSearch(tag, q) {
  if (!q) return true;
  const haystack = [
    tag.displayNameJa,
    tag.tag,
    tag.description,
    tag.categoryName,
    tag.subcategoryName,
    listText(tag.searchKeywordsJa),
    listText(tag.aliases),
    listText(tag.relatedTags)
  ].map(normalize).join(" ");
  return haystack.includes(normalize(q));
}

function groupedTags(q="") {
  const groups = new Map();
  for (const cat of CATEGORIES) {
    groups.set(cat.categoryId, { category: cat, subgroups: new Map(), count: 0 });
  }
  for (const tag of TAGS) {
    if (!matchesSearch(tag, q)) continue;
    if (!groups.has(tag.categoryId)) continue;
    const catGroup = groups.get(tag.categoryId);
    if (!catGroup.subgroups.has(tag.subcategoryId)) {
      catGroup.subgroups.set(tag.subcategoryId, {
        subcategoryId: tag.subcategoryId,
        subcategoryName: tag.subcategoryName,
        tags: []
      });
    }
    catGroup.subgroups.get(tag.subcategoryId).tags.push(tag);
    catGroup.count += 1;
  }
  return Array.from(groups.values()).filter(g => g.count > 0);
}

function selectedCountForCategory(categoryId) {
  return TAGS.filter(t => t.categoryId === categoryId && state.has(t.id)).length;
}

function render(q="") {
  const groups = groupedTags(q);
  meta.textContent = `tags.json: ${TAGS.length} tags / categories.json: ${CATEGORIES.length} categories`;
  categoryRoot.innerHTML = "";

  groups.forEach((group, index) => {
    const selected = selectedCountForCategory(group.category.categoryId);
    const section = document.createElement("section");
    section.className = "category" + (index < 3 || q ? " open" : "");
    section.dataset.categoryId = group.category.categoryId;

    const head = document.createElement("button");
    head.className = "cat-head";
    head.innerHTML = `<span>${group.category.categoryName}</span><span class="cat-count">${selected} selected ${section.classList.contains("open") ? "▲" : "▼"}</span>`;
    head.addEventListener("click", () => {
      section.classList.toggle("open");
      updateCategoryHeaders();
    });
    section.appendChild(head);

    const body = document.createElement("div");
    body.className = "cat-body";

    Array.from(group.subgroups.values()).forEach(sub => {
      const subhead = document.createElement("div");
      subhead.className = "subcat";
      subhead.textContent = sub.subcategoryName;
      body.appendChild(subhead);

      const tagBox = document.createElement("div");
      tagBox.className = "tags";

      sub.tags.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = "tag" + (state.has(tag.id) ? " on" : "");
        btn.innerHTML = `${tag.displayNameJa} <span class="i">ⓘ</span>`;
        btn.title = tag.tag;
        btn.addEventListener("click", (ev) => {
          const rect = btn.getBoundingClientRect();
          const isInfoArea = ev.clientX > rect.right - 28;
          if (isInfoArea) {
            openInfo(tag);
          } else {
            toggleTag(tag);
          }
        });
        tagBox.appendChild(btn);
      });

      body.appendChild(tagBox);
    });

    section.appendChild(body);
    categoryRoot.appendChild(section);
  });

  refreshPreview();
}

function updateCategoryHeaders() {
  document.querySelectorAll(".category").forEach(section => {
    const categoryId = section.dataset.categoryId;
    const count = selectedCountForCategory(categoryId);
    const countEl = section.querySelector(".cat-count");
    countEl.textContent = `${count} selected ${section.classList.contains("open") ? "▲" : "▼"}`;
  });
}

function toggleTag(tag) {
  if (state.has(tag.id)) {
    state.delete(tag.id);
  } else {
    if (tag.selectionRule === "single" || tag.selectionRule === "exclusive") {
      TAGS.forEach(other => {
        if (other.selectionGroup === tag.selectionGroup) state.delete(other.id);
      });
    }
    state.add(tag.id);
  }
  render(searchInput.value.trim());
}

function refreshPreview() {
  updateCategoryHeaders();
  const selected = TAGS.filter(t => state.has(t.id)).sort((a,b) => a.sortOrder - b.sortOrder);
  if (!selected.length) {
    preview.innerHTML = `<div class="preview-empty">タグを選ぶとここに日本語＋英語で表示されます。</div>`;
    copyText.textContent = "";
    return;
  }

  preview.innerHTML = selected.map(tag => `
    <div class="preview-line">
      <div class="cat-label">${tag.categoryName}</div>
      <div>
        <div class="jp">${tag.displayNameJa}</div>
        <div class="en">${tag.tag}</div>
      </div>
    </div>
  `).join("");
  copyText.textContent = selected.map(t => t.tag).join(", ");
}

function openInfo(tag) {
  document.getElementById("infoBody").innerHTML = `
    <p style="margin:0 0 4px;font-weight:900;">${tag.displayNameJa}</p>
    <p class="en" style="margin:0 0 8px;">${tag.tag}</p>
    <p style="font-size:12px;margin:0;">${tag.description || "説明は未登録です。"}</p>
    <div class="sample">${tag.infoThumbnail ? "登録サムネ" : "登録サムネ未設定"}</div>
    <p class="meta">selection: ${tag.selectionRule} / group: ${tag.selectionGroup}</p>
  `;
  document.getElementById("infoModal").classList.add("show");
}

function openSave() {
  const selected = TAGS.filter(t => state.has(t.id));
  const selectedCategories = new Set(selected.map(t => t.categoryId));
  document.getElementById("saveChecks").innerHTML = CATEGORIES.map(cat => `
    <label class="check">
      <input type="checkbox" ${selectedCategories.has(cat.categoryId) ? "checked" : ""}>
      ${cat.categoryName}
    </label>
  `).join("");
  document.getElementById("saveModal").classList.add("show");
}

function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 1300);
}

searchInput.addEventListener("input", () => render(searchInput.value.trim()));
document.getElementById("clearBtn").addEventListener("click", () => { state.clear(); render(searchInput.value.trim()); });
document.getElementById("saveBtn").addEventListener("click", openSave);
document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = copyText.textContent;
  if (!text) return showToast("タグ未選択です");
  try {
    await navigator.clipboard.writeText(text);
    showToast("コピーしました");
  } catch(e) {
    showToast("コピー欄を長押ししてコピー");
  }
});
document.getElementById("closeInfo").addEventListener("click", () => document.getElementById("infoModal").classList.remove("show"));
document.getElementById("cancelSave").addEventListener("click", () => document.getElementById("saveModal").classList.remove("show"));
document.getElementById("confirmSave").addEventListener("click", () => {
  document.getElementById("saveModal").classList.remove("show");
  showToast("保存しました（Prototype）");
});
document.querySelectorAll(".modal-bg").forEach(modal => {
  modal.addEventListener("click", ev => {
    if (ev.target === modal) modal.classList.remove("show");
  });
});

render();
</script>
</body>
</html>
